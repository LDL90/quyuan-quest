<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🐉 寻找屈原的足迹</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;min-height:100vh;overflow-x:hidden}
.ctr{max-width:420px;margin:0 auto;padding:20px;min-height:100vh}
.home{text-align:center;padding-top:12vh}
.home .logo{font-size:72px;margin-bottom:16px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.home h1{font-size:28px;margin-bottom:8px;text-shadow:0 2px 12px rgba(255,180,0,.5)}
.home .sub{font-size:15px;color:#aab;margin-bottom:40px}
.btn{display:inline-block;padding:14px 48px;border-radius:50px;background:linear-gradient(135deg,#e94560,#c23616);color:#fff;font-size:18px;font-weight:600;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(233,69,96,.4)}
.btn:active{transform:scale(.96)}
.btn2{background:linear-gradient(135deg,#0f3460,#16213e);box-shadow:0 4px 20px rgba(15,52,96,.4)}
.btn-s{padding:8px 20px;font-size:13px}
.btn-a{background:linear-gradient(135deg,#333,#555);box-shadow:0 2px 10px rgba(0,0,0,.3);margin-top:30px;font-size:12px;padding:8px 20px;cursor:pointer;border:1px solid rgba(255,255,255,.1);color:#887}
.badge{display:inline-block;padding:4px 16px;border-radius:20px;background:rgba(233,69,96,.2);color:#e94560;font-size:13px;font-weight:600;margin-bottom:16px}
.story{background:rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:24px;line-height:1.8;font-size:15px;border-left:3px solid #e94560}
.task{background:rgba(233,69,96,.1);border-radius:16px;padding:20px;margin-bottom:20px}
.task h3{font-size:16px;margin-bottom:16px;color:#ffb400}
.chs{display:flex;flex-direction:column;gap:12px}
.cb{padding:14px 20px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:15px;cursor:pointer;text-align:left}
.cb:active{transform:scale(.98)}
.cb.ok{border-color:#4caf50;background:rgba(76,175,80,.2);animation:cp .5s}
.cb.no{border-color:#e94560;background:rgba(233,69,96,.2);animation:sk .4s}
@keyframes cp{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fi{width:100%;padding:14px 20px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:18px;text-align:center;letter-spacing:4px;outline:none}
.fi:focus{border-color:#e94560}
.pa{width:100%;min-height:200px;border-radius:16px;border:2px dashed rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.pa .ph{text-align:center;color:#667}
.pa .ph .ic{font-size:48px;margin-bottom:8px}
.pa img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.pa input{display:none}
.tip{background:rgba(255,180,0,.1);border-radius:16px;padding:16px;margin-top:16px;font-size:13px;line-height:1.8;border-left:3px solid #ffb400;color:#ddc}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.mo.show{display:flex}
.md{background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:24px;padding:32px;text-align:center;max-width:340px;width:90%;animation:mi .4s ease-out}
@keyframes mi{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.md .em{font-size:64px;margin-bottom:12px}
.md h2{font-size:22px;margin-bottom:8px}
.md p{font-size:14px;color:#aab;margin-bottom:24px;line-height:1.6}
.pb{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.1);z-index:50}
.pb .fl{height:100%;background:linear-gradient(90deg,#e94560,#ffb400);transition:width .5s}
.ct{background:linear-gradient(135deg,#2d1b00,#1a1a2e);border:3px solid #ffb400;border-radius:16px;padding:32px 24px;text-align:center;margin:20px 0}
.ct .cr{font-size:48px;margin-bottom:12px}
.ct h2{color:#ffb400;font-size:24px;margin-bottom:4px}
.ct .ni{background:none;border:none;border-bottom:2px solid #ffb400;color:#ffb400;font-size:20px;text-align:center;padding:4px 8px;outline:none;width:140px;font-family:inherit}
.ct .dt{color:#887;font-size:13px;margin-top:16px}
.ct .qt{color:#ddc;font-size:14px;margin-top:12px;font-style:italic}
.ct .sc{color:#4caf50;font-size:14px;margin-top:8px}
.ap{display:none;max-width:800px;margin:0 auto;padding:20px}
.ap.show{display:block}
.ap h2{text-align:center;margin-bottom:20px;color:#ffb400}
.sb{display:flex;justify-content:space-around;margin-bottom:20px}
.si{text-align:center}
.si .n{font-size:28px;font-weight:700;color:#ffb400}
.si .l{font-size:12px;color:#887}
.ac{background:rgba(255,255,255,.06);border-radius:12px;padding:16px;margin-bottom:12px;border-left:3px solid #e94560}
.ac .nm{font-size:18px;font-weight:600;margin-bottom:4px}
.ac .inf{font-size:13px;color:#aab;line-height:1.8}
.ac .ans{font-size:12px;color:#887;margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px}
.ac .act{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.aa{text-align:center;margin:20px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.es{text-align:center;color:#667;padding:40px 0}
.es .ic{font-size:48px;margin-bottom:8px}
.pw{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center}
.pw-box{background:#1a1a2e;border-radius:16px;padding:32px;text-align:center;max-width:320px;width:90%}
.pw-box h2{color:#ffb400;margin-bottom:16px}
.pw-box input{width:100%;padding:12px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:20px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:16px}
.pw-box input:focus{border-color:#e94560}
.pw-box .err{color:#e94560;font-size:13px;min-height:20px}
.pt{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200}
.pt span{position:absolute;font-size:24px;animation:pf 3s ease-in forwards}
@keyframes pf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media print{body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.btn,.btn2,.btn-a,.pb,.mo,.pt,.ap,.pw{display:none!important}.ct{border:4px double #b8860b;margin-top:80px;background:linear-gradient(135deg,#fffdf0,#fff8e1)!important;color:#333!important}.ct h2{color:#b8860b!important}.ct .ni{color:#b8860b!important;border-color:#b8860b!important}.ct .dt{color:#666!important}.ct .qt{color:#555!important}.ct .sc{color:#2e7d32!important}.ct .cr{font-size:64px}.np{display:none!important}}
</style>
</head>
<body>
<div class="pb"><div class="fl" id="pFill"></div></div>
<div class="pw" id="pwModal" style="display:none">
<div class="pw-box">
<h2>🔒 管理员验证</h2>
<input type="password" id="pwInput" maxlength="10" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPw()">
<p class="err" id="pwErr"></p>
<button class="btn btn-s" onclick="checkPw()">确认</button>
<br><br>
<a href="#" onclick="closePw()" style="color:#667;font-size:13px;text-decoration:none">← 返回</a>
</div>
</div>
<div class="ctr home" id="homePage">
<div class="logo">🐉</div>
<h1>寻找屈原的足迹</h1>
<p class="sub">端午文化探秘 · 公园闯关寻游</p>
<button class="btn" onclick="startGame()">开始探秘</button>
<br><br>
<p style="font-size:12px;color:#556">适合5-12岁亲子家庭 · 约60分钟</p>
<button class="btn-a" onclick="openPw()">📊 管理员面板</button>
</div>
<div class="ctr" id="lc" style="display:none"></div>
<div class="ap" id="ap">
<h2>📊 通关数据统计</h2>
<div id="sb" class="sb"></div>
<div id="al"></div>
<div class="aa np" id="aa2">
<button class="btn btn2 btn-s" onclick="exportCSV()">📥 导出CSV</button>
<button class="btn btn2 btn-s" onclick="printAllCerts()">🖨️ 批量打印证书</button>
<button class="btn btn2 btn-s" onclick="clearAll()">🗑️ 清空数据</button>
<button class="btn btn2 btn-s" onclick="hideAdmin()">← 返回</button>
</div>
</div>
<div class="mo" id="modal">
<div class="md">
<div class="em" id="mE">🎉</div>
<h2 id="mT">太棒了！</h2>
<p id="mP">你答对了！</p>
<button class="btn" id="mB" onclick="nextLv()">下一关</button>
</div>
</div>
<div class="pt" id="pts"></div>
<script>
var L=[
{id:1,badge:'🏠 第1关',title:'汨罗江畔',story:'屈原站在汨罗江边，望着远方，心中满是忧愁。他深爱着自己的国家，却无法改变腐败的朝政。小朋友，你知道屈原是哪个国家的人吗？',type:'choice',question:'屈原是哪个国家的人？',choices:['秦国','楚国','齐国','燕国'],answer:1,tip:'屈原是楚国的三闾大夫，他深爱着自己的国家！'},
{id:2,badge:'🌿 第2关',title:'艾草飘香',story:'端午节到了，家家户户门前都挂上了艾草。传说艾草可以驱邪避害，保护家人平安。小朋友，看看周围，找到公园里你觉得最特别的植物吧！',type:'photo',question:'拍下公园里你最喜欢的一种植物',tip:'屈原在《离骚》中写道："扈江离与辟芷兮，纫秋兰以为佩"——他也很喜欢香草呢！'},
{id:3,badge:'🐉 第3关',title:'龙舟竞渡',story:'听！远处传来鼓声——咚！咚！咚！那是龙舟赛的鼓点！传说屈原投江后，人们划龙舟去救他，后来就变成了端午赛龙舟的习俗。',type:'choice',question:'端午节赛龙舟的习俗是为了纪念谁？',choices:['纪念大禹治水','纪念屈原','纪念孔子','纪念诸葛亮'],answer:1,tip:'龙舟竞渡，百舸争流！团结协作才能最快到达！'},
{id:4,badge:'📜 第4关',title:'离骚长歌',story:'屈原写下了千古名篇《离骚》，这是中国最长的抒情诗，也是"楚辞"的代表作。他把香草美人写入诗中，比喻高洁的品格。这首诗影响了中国两千多年的文学！',type:'choice',question:'屈原创立的诗歌体裁叫什么？',choices:['唐诗','宋词','楚辞','元曲'],answer:2,tip:'《离骚》共373句、2490字。屈原创立了"楚辞"，用香草美人比喻高洁品格，被称为"辞赋之祖"。'},
{id:5,badge:'🥟 第5关',title:'粽香传情',story:'传说屈原投江后，百姓怕鱼虾吃他的身体，就把米团投入江中，后来演变成了包粽子。粽子有甜有咸，你喜欢吃哪种呢？',type:'choice',question:'最早的粽子是什么口味？',choices:['甜粽（红豆馅）','咸粽（肉馅）','没有馅的纯米粽'],answer:2,tip:'最早的粽子叫"角黍"，是用菰叶包黍米做成牛角状。现在的粽子五花八门，你家乡包什么粽？'},
{id:6,badge:'🏆 第6关',title:'屈原精神',story:'小朋友，你今天跟着屈原走过了一段了不起的旅程！屈原教会我们：要热爱自己的国家，要坚持做对的事情，要勇敢地说出真话。',type:'text',question:'今天你学到的关于屈原的一件事是什么？',tip:'路漫漫其修远兮，吾将上下而求索 🐉'}
];
var cl=0,pn='',pp='',gt=null,ans=[],photoOk=false,wrongs=0;
var SK='quyuan_quest_records';
function gR(){try{return JSON.parse(localStorage.getItem(SK)||'[]')}catch(e){return[]}}
function sR(r){var a=gR();a.push(r);localStorage.setItem(SK,JSON.stringify(a))}
function startGame(){
var n=prompt('小朋友，你叫什么名字？');if(!n)return;pn=n.trim();
var p=prompt('请输入家长手机号（用于领取证书）：');pp=p?p.trim():'';
cl=0;ans=[];photoOk=false;wrongs=0;gt=new Date().toISOString();
document.getElementById('homePage').style.display='none';renderLv();
}
function renderLv(){
var l=L[cl],c=document.getElementById('lc');
document.getElementById('pFill').style.width=(cl/L.length*100)+'%';
var t='';
if(l.type==='choice'){
t='<div class="task"><h3>'+l.question+'</h3><div class="chs">'+l.choices.map(function(o,i){return '<button class="cb" onclick="chkC('+i+','+l.answer+')">'+String.fromCharCode(65+i)+'. '+o+'</button>'}).join('')+'</div></div>';
}else if(l.type==='photo'){
t='<div class="task"><h3>'+l.question+'</h3><div class="pa" onclick="document.getElementById(\'pi\').click()"><div class="ph" id="ppH"><div class="ic">📷</div><p>点击拍照或上传</p></div><input type="file" id="pi" accept="image/*" capture="environment" onchange="hPhoto(event)"></div><br><button class="btn btn2" onclick="cmpPhoto()">完成拍照</button></div>';
}else if(l.type==='text'){
t='<div class="task"><h3>'+l.question+'</h3><textarea class="fi" id="tA" rows="3" placeholder="写下你的答案..." style="letter-spacing:0;font-size:15px"></textarea><br><br><button class="btn btn2" onclick="cmpText()">提交答案</button></div>';
}
c.innerHTML='<div class="badge">'+l.badge+' · '+l.title+'</div><div class="story">'+l.story+'</div>'+t+'<div class="tip">💡 '+l.tip+'</div>';
c.style.display='block';
}
function chkC(sel,ok){
var bs=document.querySelectorAll('.cb');
bs.forEach(function(b,i){b.style.pointerEvents='none';if(i===ok)b.classList.add('ok');else if(i===sel&&i!==ok)b.classList.add('no')});
if(sel===ok){recA(true,wrongs);wrongs=0;setTimeout(cmpLv,800)}else{wrongs++;setTimeout(function(){bs.forEach(function(b){b.style.pointerEvents='auto';b.classList.remove('no')})},1000)}
}
function cmpPhoto(){photoOk=true;recA(true,0);cmpLv()}
function cmpText(){var v=document.getElementById('tA').value.trim();if(!v){alert('请写下你的答案再提交哦~');return}recA(true,0,v);cmpLv()}
function recA(ok,w,ft){
ans.push({level:L[cl].id,title:L[cl].title,type:L[cl].type,question:L[cl].question,correct:ok,wrongAttempts:w,answer:ft||(ok?'correct':'wrong')});
}
function cmpLv(){
var l=L[cl],last=cl===L.length-1;
showMo(last?'🏆':l.tip,last?'全部通关！':'太棒了！',last?pn+'，你是屈原文化小达人！':l.tip,last?'领取证书':'下一关');
}
function showMo(e,t,p,b){
document.getElementById('mE').textContent=e;document.getElementById('mT').textContent=t;
document.getElementById('mP').textContent=p;document.getElementById('mB').textContent=b;
document.getElementById('modal').classList.add('show');spawnP();
}
function nextLv(){
document.getElementById('modal').classList.remove('show');cl++;
if(cl>=L.length)finish();else renderLv();
}
function finish(){
document.getElementById('lc').style.display='none';
document.getElementById('pFill').style.width='100%';
var s=Math.round((new Date()-new Date(gt))/1000),m=Math.floor(s/60),sec=s%60;
var cc=ans.filter(function(a){return a.correct}).length;
var score=Math.round(cc/L.length*100);
var d=new Date(),ds=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
var rec={id:Date.now(),name:pn,phone:pp,date:d.toLocaleString('zh-CN'),timestamp:gt,duration:m+'分'+sec+'秒',score:score,correctCount:cc,totalLevels:L.length,answers:ans};
sR(rec);showCert(rec);
}
function showCert(r){
var d=new Date(),ds=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
var se=r.score>=80?'🌟🌟🌟':r.score>=60?'🌟🌟':'🌟';
var h=document.getElementById('homePage');h.style.display='block';h.style.paddingTop='30px';
h.innerHTML='<div class="ct" id="pC"><div class="cr">👑</div><h2>屈原文化小达人</h2><br><p style="color:#ddc;font-size:15px">兹证明</p><input class="ni" id="cN" value="'+r.name+'" placeholder="你的名字"><p style="color:#ddc;font-size:14px;margin-top:12px">小朋友于'+ds+'成功完成</p><p style="color:#ddc;font-size:14px">「寻找屈原的足迹」全部'+r.totalLevels+'关</p><p class="sc">正确率：'+r.score+'% '+se+' · 用时：'+r.duration+'</p><p style="color:#ddc;font-size:14px">荣获 <strong style="color:#ffb400">屈原文化小达人</strong> 称号</p><p class="qt">「路漫漫其修远兮，吾将上下而求索」🐉</p><p class="dt">端午安康 · '+ds+'</p></div><br><div class="np" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="btn" onclick="window.print()">🖨️ 打印证书</button><button class="btn btn2" onclick="location.reload()">🔄 再来一次</button><button class="btn btn2" onclick="shareC()">📤 分享</button></div><button class="btn-a np" onclick="openPw()">📊 管理员面板</button>';
spawnP();spawnP();
}
function shareC(){
var n=document.getElementById('cN')?document.getElementById('cN').value:pn;
var t='🐉 '+n+'完成了「寻找屈原的足迹」端午文化探秘，成为屈原文化小达人！路漫漫其修远兮，吾将上下而求索 🏆';
if(navigator.share){navigator.share({title:'寻找屈原的足迹',text:t,url:location.href})}else{navigator.clipboard.writeText(t).then(function(){alert('已复制到剪贴板')})}
}
function spawnP(){
var c=document.getElementById('pts'),es=['🐉','🥟','🌿','🏮','✨','🎉','⭐','🎋'];
for(var i=0;i<10;i++){var s=document.createElement('span');s.textContent=es[Math.floor(Math.random()*es.length)];s.style.left=Math.random()*100+'%';s.style.animationDelay=Math.random()*2+'s';s.style.animationDuration=(2+Math.random()*2)+'s';c.appendChild(s);(function(el){setTimeout(function(){el.remove()},4000)})(s)}
}
// ===== Admin =====
function openPw(){document.getElementById('pwModal').style.display='flex';document.getElementById('pwInput').value='';document.getElementById('pwErr').textContent='';document.getElementById('pwInput').focus()}
function closePw(){document.getElementById('pwModal').style.display='none'}
function checkPw(){
var v=document.getElementById('pwInput').value;
if(v==='8023'){closePw();showAdmin()}else{document.getElementById('pwErr').textContent='密码错误'}
}
function showAdmin(){
document.getElementById('homePage').style.display='none';document.getElementById('lc').style.display='none';
document.getElementById('ap').classList.add('show');renderAdmin();
}
function hideAdmin(){document.getElementById('ap').classList.remove('show');document.getElementById('homePage').style.display='block'}
function renderAdmin(){
var rs=gR(),tp=rs.length,avg=tp?Math.round(rs.reduce(function(s,r){return s+r.score},0)/tp):0,pf=rs.filter(function(r){return r.score===100}).length;
document.getElementById('sb').innerHTML='<div class="si"><div class="n">'+tp+'</div><div class="l">通关人数</div></div><div class="si"><div class="n">'+avg+'%</div><div class="l">平均正确率</div></div><div class="si"><div class="n">'+pf+'</div><div class="l">满分人数</div></div>';
var list=document.getElementById('al');
if(!rs.length){list.innerHTML='<div class="es"><div class="ic">📭</div><p>暂无通关数据</p></div>';return}
list.innerHTML=rs.slice().reverse().map(function(r,i){
var aStr=r.answers.map(function(a){return '<div>'+a.title+'：'+(a.correct?'✅':'❌')+(a.wrongAttempts>0?'(错'+a.wrongAttempts+'次)':'')+'</div>'}).join('');

function exportCSV(){
var rs=gR();if(!rs.length){alert('暂无数据');return}
var h=['序号','姓名','手机号','日期','用时','正确率','正确/总关'];
L.forEach(function(l){h.push(l.title+'-结果')});L.forEach(function(l){h.push(l.title+'-错误次数')});
var rows=rs.map(function(r,i){
var a=r.answers||[];var row=[i+1,r.name,r.phone||'',r.date,r.duration,r.score+'%',r.correctCount+'/'+r.totalLevels];
L.forEach(function(l,li){row.push(a[li]?a[li].correct?'正确':'错误':'未答')});
L.forEach(function(l,li){row.push(a[li]?a[li].wrongAttempts||0:0)});
return row;
});
var csv='\uFEFF'+h.join(',')+'\n';
rows.forEach(function(row){csv+=row.map(function(v){return '"'+v+'"'}).join(',')+'\n'});
var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
var link=document.createElement('a');link.href=URL.createObjectURL(blob);
link.download='屈原探秘数据_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.csv';
link.click();URL.revokeObjectURL(link.href);
}
