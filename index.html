<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐉 寻找屈原的足迹</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff; min-height: 100vh; overflow-x: hidden;
}
.container { max-width: 420px; margin: 0 auto; padding: 20px; min-height: 100vh; }

/* 首页 */
.home { text-align: center; padding-top: 15vh; }
.home .logo { font-size: 72px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.home h1 { font-size: 28px; margin-bottom: 8px; text-shadow: 0 2px 12px rgba(255,180,0,0.5); }
.home .subtitle { font-size: 15px; color: #aab; margin-bottom: 40px; }
.btn {
  display: inline-block; padding: 14px 48px; border-radius: 50px;
  background: linear-gradient(135deg, #e94560, #c23616);
  color: #fff; font-size: 18px; font-weight: 600;
  text-decoration: none; border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(233,69,96,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:active { transform: scale(0.96); }
.btn-secondary {
  background: linear-gradient(135deg, #0f3460, #16213e);
  box-shadow: 0 4px 20px rgba(15,52,96,0.4);
}

/* 关卡页 */
.level-page { padding-top: 20px; }
.level-badge {
  display: inline-block; padding: 4px 16px; border-radius: 20px;
  background: rgba(233,69,96,0.2); color: #e94560;
  font-size: 13px; font-weight: 600; margin-bottom: 16px;
}
.story-box {
  background: rgba(255,255,255,0.08); border-radius: 16px;
  padding: 20px; margin-bottom: 24px; line-height: 1.8;
  font-size: 15px; border-left: 3px solid #e94560;
}
.task-box {
  background: rgba(233,69,96,0.1); border-radius: 16px;
  padding: 20px; margin-bottom: 20px;
}
.task-box h3 { font-size: 16px; margin-bottom: 16px; color: #ffb400; }

/* 选择题 */
.choices { display: flex; flex-direction: column; gap: 12px; }
.choice-btn {
  padding: 14px 20px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05); color: #fff; font-size: 15px;
  cursor: pointer; text-align: left; transition: all 0.2s;
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn.correct {
  border-color: #4caf50; background: rgba(76,175,80,0.2);
  animation: correctPulse 0.5s;
}
.choice-btn.wrong {
  border-color: #e94560; background: rgba(233,69,96,0.2);
  animation: shake 0.4s;
}
@keyframes correctPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* 填空题 */
.fill-input {
  width: 100%; padding: 14px 20px; border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  color: #fff; font-size: 18px; text-align: center; letter-spacing: 4px;
  outline: none; transition: border-color 0.2s;
}
.fill-input:focus { border-color: #e94560; }

/* 拍照 */
.photo-area {
  width: 100%; min-height: 200px; border-radius: 16px;
  border: 2px dashed rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; position: relative;
  overflow: hidden;
}
.photo-area:active { transform: scale(0.98); }
.photo-area .placeholder { text-align: center; color: #667; }
.photo-area .placeholder .icon { font-size: 48px; margin-bottom: 8px; }
.photo-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
.photo-area input[type=file] { display: none; }

/* 知识卡 */
.knowledge {
  background: rgba(255,180,0,0.1); border-radius: 16px;
  padding: 16px; margin-top: 16px; font-size: 13px; line-height: 1.8;
  border-left: 3px solid #ffb400; color: #ddc;
}

/* 通关弹窗 */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  border-radius: 24px; padding: 32px; text-align: center;
  max-width: 340px; width: 90%;
  animation: modalIn 0.4s ease-out;
}
@keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal .emoji { font-size: 64px; margin-bottom: 12px; }
.modal h2 { font-size: 22px; margin-bottom: 8px; }
.modal p { font-size: 14px; color: #aab; margin-bottom: 24px; line-height: 1.6; }

/* 进度条 */
.progress-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 4px;
  background: rgba(255,255,255,0.1); z-index: 50;
}
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, #e94560, #ffb400); transition: width 0.5s; }

/* 证书 */
.certificate {
  background: linear-gradient(135deg, #2d1b00, #1a1a2e);
  border: 3px solid #ffb400; border-radius: 16px;
  padding: 32px 24px; text-align: center; margin: 20px 0;
}
.certificate .crown { font-size: 48px; margin-bottom: 12px; }
.certificate h2 { color: #ffb400; font-size: 24px; margin-bottom: 4px; }
.certificate .name-input {
  background: none; border: none; border-bottom: 2px solid #ffb400;
  color: #ffb400; font-size: 20px; text-align: center;
  padding: 4px 8px; outline: none; width: 140px;
}
.certificate .date { color: #887; font-size: 13px; margin-top: 16px; }
.certificate .quote { color: #ddc; font-size: 14px; margin-top: 12px; font-style: italic; }

/* 纷飞粒子 */
.particles { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 200; }
.particle {
  position: absolute; font-size: 24px;
  animation: particleFall 3s ease-in forwards;
}
@keyframes particleFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<!-- 首页 -->
<div class="container home" id="homePage">
  <div class="logo">🐉</div>
  <h1>寻找屈原的足迹</h1>
  <p class="subtitle">端午文化探秘 · 公园闯关寻游</p>
  <button class="btn" onclick="startGame()">开始探秘</button>
  <br><br>
  <p style="font-size:12px;color:#556;">适合5-12岁亲子家庭 · 约60分钟</p>
</div>

<!-- 关卡容器 -->
<div class="container level-page" id="levelContainer" style="display:none"></div>

<!-- 通关弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="emoji" id="modalEmoji">🎉</div>
    <h2 id="modalTitle">太棒了！</h2>
    <p id="modalText">你答对了！</p>
    <button class="btn" id="modalBtn" onclick="nextLevel()">下一关</button>
  </div>
</div>

<!-- 粒子容器 -->
<div class="particles" id="particles"></div>

<script>
// 关卡数据
const levels = [
  {
    id: 1, badge: '🏠 第1关', title: '汨罗江畔',
    story: '屈原站在汨罗江边，望着远方，心中满是忧愁。他深爱着自己的国家，却无法改变腐败的朝政。小朋友，你知道屈原是哪个国家的人吗？',
    type: 'choice',
    question: '屈原是哪个国家的人？',
    choices: ['秦国', '楚国', '齐国', '燕国'],
    answer: 1,
    tip: '屈原是楚国的三闾大夫，他深爱着自己的国家！',
    emoji: '🏞️'
  },
  {
    id: 2, badge: '🌿 第2关', title: '艾草飘香',
    story: '端午节到了，家家户户门前都挂上了艾草。传说艾草可以驱邪避害，保护家人平安。小朋友，看看周围，找到公园里你觉得最特别的植物吧！',
    type: 'photo',
    question: '拍下公园里你最喜欢的一种植物',
    tip: '屈原在《离骚》中写道："扈江离与辟芷兮，纫秋兰以为佩"——他也很喜欢香草呢！',
    emoji: '🌿'
  },
  {
    id: 3, badge: '🐉 第3关', title: '龙舟竞渡',
    story: '听！远处传来鼓声——咚！咚！咚！那是龙舟赛的鼓点！传说屈原投江后，人们划龙舟去救他，后来就变成了端午赛龙舟的习俗。',
    type: 'choice',
    question: '龙舟上最少需要几个人？',
    choices: ['2人（一个划船一个打鼓）', '10人', '20人'],
    answer: 0,
    tip: '龙舟竞渡，百舸争流！团结协作才能最快到达！',
    emoji: '🚣'
  },
  {
    id: 4, badge: '📜 第4关', title: '离骚长歌',
    story: '屈原写下了千古名篇《离骚》，这是中国最长的抒情诗。他写道：「路漫漫其修远兮，吾将上下而求索」——意思是，路还很长，但我要坚持探索！',
    type: 'fill',
    question: '「路漫漫其修远兮，____而求索」',
    answer: '上下',
    tip: '《离骚》共373句、2490字，屈原用香草美人比喻高洁的品格，被称为"辞赋之祖"。',
    emoji: '📜'
  },
  {
    id: 5, badge: '🥟 第5关', title: '粽香传情',
    story: '传说屈原投江后，百姓怕鱼虾吃他的身体，就把米团投入江中，后来演变成了包粽子。粽子有甜有咸，你喜欢吃哪种呢？',
    type: 'choice',
    question: '最早的粽子是什么口味？',
    choices: ['甜粽', '咸粽', '没有馅的纯米粽'],
    answer: 2,
    tip: '最早的粽子叫"角黍"，是用菰叶包黍米做成牛角状。现在的粽子五花八门，你家乡包什么粽？',
    emoji: '🥟'
  },
  {
    id: 6, badge: '🏆 第6关', title: '屈原精神',
    story: '小朋友，你今天跟着屈原走过了一段了不起的旅程！屈原教会我们：要热爱自己的国家，要坚持做对的事情，要勇敢地说出真话。',
    type: 'text',
    question: '今天你学到的关于屈原的一件事是什么？',
    tip: '路漫漫其修远兮，吾将上下而求索 🐉',
    emoji: '🏆'
  }
];

let currentLevel = 0;
let playerName = '';

function startGame() {
  const name = prompt('小朋友，你叫什么名字？');
  if (name) playerName = name.trim();
  currentLevel = 0;
  document.getElementById('homePage').style.display = 'none';
  renderLevel();
}

function renderLevel() {
  const level = levels[currentLevel];
  const container = document.getElementById('levelContainer');
  const progress = ((currentLevel) / levels.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  let taskHTML = '';
  switch (level.type) {
    case 'choice':
      taskHTML = `<div class="task-box"><h3>${level.emoji} ${level.question}</h3><div class="choices">
        ${level.choices.map((c, i) => `<button class="choice-btn" onclick="checkChoice(${i}, ${level.answer})">${String.fromCharCode(65+i)}. ${c}</button>`).join('')}
      </div></div>`;
      break;
    case 'fill':
      taskHTML = `<div class="task-box"><h3>${level.emoji} ${level.question}</h3>
        <input class="fill-input" id="fillAnswer" placeholder="输入答案" maxlength="10" onkeydown="if(event.key==='Enter')checkFill()">
        <br><br><button class="btn btn-secondary" onclick="checkFill()">确认</button></div>`;
      break;
    case 'photo':
      taskHTML = `<div class="task-box"><h3>${level.emoji} ${level.question}</h3>
        <div class="photo-area" onclick="document.getElementById('photoInput').click()">
          <div class="placeholder" id="photoPlaceholder"><div class="icon">📷</div><p>点击拍照或上传</p></div>
          <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(event)">
        </div>
        <br><button class="btn btn-secondary" onclick="completeLevel()">完成拍照</button></div>`;
      break;
    case 'text':
      taskHTML = `<div class="task-box"><h3>${level.emoji} ${level.question}</h3>
        <textarea class="fill-input" id="textAnswer" rows="3" placeholder="写下你的答案..." style="letter-spacing:0;font-size:15px;"></textarea>
        <br><br><button class="btn btn-secondary" onclick="completeLevel()">提交答案</button></div>`;
      break;
  }

  container.innerHTML = `
    <div class="level-badge">${level.badge} · ${level.title}</div>
    <div class="story-box">${level.story}</div>
    ${taskHTML}
    <div class="knowledge">💡 ${level.tip}</div>
  `;
  container.style.display = 'block';
}

function checkChoice(selected, correct) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.style.pointerEvents = 'none';
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && i !== correct) btn.classList.add('wrong');
  });
  if (selected === correct) {
    setTimeout(() => completeLevel(), 800);
  } else {
    setTimeout(() => {
      btns.forEach(btn => { btn.style.pointerEvents = 'auto'; btn.classList.remove('wrong'); });
    }, 1000);
  }
}

function checkFill() {
  const input = document.getElementById('fillAnswer');
  if (input.value.trim() === levels[currentLevel].answer) {
    input.style.borderColor = '#4caf50';
    setTimeout(() => completeLevel(), 600);
  } else {
    input.style.borderColor = '#e94560';
    input.value = '';
    input.placeholder = '再想想？';
    setTimeout(() => { input.style.borderColor = 'rgba(255,255,255,0.15)'; }, 1000);
  }
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const area = document.querySelector('.photo-area');
      document.getElementById('photoPlaceholder').style.display = 'none';
      const img = document.createElement('img');
      img.src = ev.target.result;
      area.appendChild(img);
    };
    reader.readAsDataURL(file);
  }
}

function completeLevel() {
  const level = levels[currentLevel];
  const isLast = currentLevel === levels.length - 1;
  showModal(
    isLast ? '🏆' : level.emoji,
    isLast ? '全部通关！' : '太棒了！',
    isLast ? `${playerName || '小朋友'}，你是屈原文化小达人！` : level.tip,
    isLast ? '领取证书' : '下一关'
  );
}

function showModal(emoji, title, text, btnText) {
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  document.getElementById('modalBtn').textContent = btnText;
  document.getElementById('modal').classList.add('show');
  spawnParticles();
}

function nextLevel() {
  document.getElementById('modal').classList.remove('show');
  currentLevel++;
  if (currentLevel >= levels.length) {
    showCertificate();
  } else {
    renderLevel();
  }
}

function showCertificate() {
  document.getElementById('levelContainer').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  const today = new Date();
  const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

  const home = document.getElementById('homePage');
  home.style.display = 'block';
  home.style.paddingTop = '40px';
  home.innerHTML = `
    <div class="certificate">
      <div class="crown">👑</div>
      <h2>屈原文化小达人</h2>
      <br>
      <p style="color:#ddc;font-size:15px;">兹证明</p>
      <input class="name-input" value="${playerName}" placeholder="你的名字">
      <p style="color:#ddc;font-size:14px;margin-top:12px;">小朋友于${dateStr}成功完成</p>
      <p style="color:#ddc;font-size:14px;">「寻找屈原的足迹」全部关卡</p>
      <p style="color:#ddc;font-size:14px;">荣获 <strong style="color:#ffb400;">屈原文化小达人</strong> 称号</p>
      <p class="quote">「路漫漫其修远兮，吾将上下而求索」🐉</p>
      <p class="date">端午安康 · ${dateStr}</p>
    </div>
    <br>
    <button class="btn" onclick="location.reload()">再来一次</button>
    <br><br>
    <button class="btn btn-secondary" onclick="shareCertificate()">分享给朋友</button>
  `;
  spawnParticles();
  spawnParticles();
}

function spawnParticles() {
  const particles = document.getElementById('particles');
  const emojis = ['🐉', '🥟', '🌿', '🏮', '✨', '🎉', '⭐', '🎋'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 2 + 's';
    p.style.animationDuration = (2 + Math.random() * 2) + 's';
    particles.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

function shareCertificate() {
  if (navigator.share) {
    navigator.share({ title: '寻找屈原的足迹', text: `${playerName}完成了端午文化探秘，成为屈原文化小达人！🐉`, url: location.href });
  } else {
    const text = `🐉 ${playerName || '我'}完成了「寻找屈原的足迹」端午文化探秘，成为屈原文化小达人！路漫漫其修远兮，吾将上下而求索 🏆`;
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板，去分享吧！'));
  }
}
</script>
</body>
</html>
